databases:
  - name: presencone-db
    databaseName: presencone_db
    user: presencone_user
    plan: free

services:
  # ──────────────────────────────────────────
  # Redis (for Celery broker & Channels)
  # ──────────────────────────────────────────
  - type: redis
    name: presencone-redis
    plan: free
    ipAllowList: []   # only internal access

  # ──────────────────────────────────────────
  # Django Backend (Web Service)
  # ──────────────────────────────────────────
  - type: web
    name: presencone-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: presencone-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: presencone-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: presencone-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: presencone-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: presencone-db
          property: port
      - key: DATABASE_SSLMODE
        value: require
      - key: CELERY_BROKER_URL
        fromService:
          name: presencone-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: presencone-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://presencone-frontend.onrender.com"

  # ──────────────────────────────────────────
  # Celery Worker (Background Service)
  # ──────────────────────────────────────────
  - type: worker
    name: presencone-celery
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info"
    plan: free
    envVars:
      - key: SECRET_KEY
        fromService:
          name: presencone-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DB_NAME
        fromDatabase:
          name: presencone-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: presencone-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: presencone-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: presencone-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: presencone-db
          property: port
      - key: DATABASE_SSLMODE
        value: require
      - key: CELERY_BROKER_URL
        fromService:
          name: presencone-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: presencone-redis
          type: redis
          property: connectionString

  # ──────────────────────────────────────────
  # React Frontend (Static Site)
  # ──────────────────────────────────────────
  - type: web
    name: presencone-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://presencone-backend.onrender.com/api/v1/"
